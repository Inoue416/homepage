# Project-scoped Codex configuration for this repository.

approval_policy = "on-request"
sandbox_mode = "workspace-write"
project_doc_max_bytes = 65536
project_doc_fallback_filenames = ["README.md"]

[features]
hooks = true
multi_agent = true

[agents]
max_threads = 6
max_depth = 1
job_max_runtime_seconds = 1800

[agents.homepage-explorer]
description = "Read-only explorer for this Astro homepage."
config_file = "./agents/homepage-explorer.toml"

[agents.homepage-reviewer]
description = "Review agent for correctness, accessibility, content schema, routing, security, dependency, and missing-test risks."
config_file = "./agents/homepage-reviewer.toml"

[agents.homepage-verifier]
description = "Verification agent for running and interpreting checks for this Astro homepage."
config_file = "./agents/homepage-verifier.toml"

[sandbox_workspace_write]
writable_roots = []
network_access = false
exclude_tmpdir_env_var = false
exclude_slash_tmp = false
